name: flamekut
description: "Flamekut — a sumi-e samurai path-drawing game."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.32.0
  flame_audio: ^2.12.1
  shared_preferences: ^2.5.3
  file_selector: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.5.4

flutter:
  uses-material-design: true
  assets:
    - assets/audio/voice/
    - assets/audio/music/
    - assets/audio/sfx/
    - assets/levels/
  shaders:
    - assets/shaders/paper.frag
    - assets/shaders/glow.frag
    - assets/shaders/chromatic.frag
